<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>上課紀錄</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="上課紀錄">
<meta name="theme-color" content="#1F6F5C">
<style>
:root{--bg:#FAF8F4;--card:#fff;--border:#E3DFD3;--text:#2B2A26;--muted:#8D8778;--accent:#1F6F5C;--soft:#E3F1EC;--danger:#B23A3A;--danger-soft:#FBEAEA;--warn:#8A6116;--warn-soft:#FAF1DC}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"PingFang TC","Microsoft JhengHei",Arial,sans-serif}.container{max-width:560px;margin:0 auto;padding:24px 16px 70px}.header h1{font-size:26px;margin:0 0 6px}.header p{margin:0 0 18px;color:#6e6b61;font-weight:600}.sync-bar,.card,.student-card,.month-card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:14px;margin-bottom:14px}.sync-bar{display:flex;justify-content:space-between;align-items:center;gap:8px;color:var(--muted);font-weight:700}.sync-bar.state-synced{color:var(--accent)}.sync-bar.state-error{background:var(--danger-soft);color:var(--danger);border-color:transparent}.sync-bar button{height:36px;padding:0 14px;border:1px solid var(--border);background:#fff;color:inherit;border-radius:12px}.sync-settings{background:#fff;border:1px solid var(--border);border-radius:16px;padding:14px;margin-bottom:14px}.sync-settings p{font-size:14px;color:#6e6b61;margin:0 0 10px}.sync-settings-actions{display:flex;gap:8px}.stats,.triple{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.stats{grid-template-columns:repeat(2,1fr);margin-bottom:14px}.stat-box{background:var(--soft);border-radius:16px;padding:16px;text-align:center}.metric{border:1px solid var(--border);border-radius:14px;padding:12px;text-align:center;background:#fff}.num{font-size:27px;font-weight:800;margin:0;color:var(--accent)}.metric .num{color:var(--text)}.label{font-size:13px;font-weight:700;color:#6e6b61;margin-top:3px}input{width:100%;height:50px;border:1px solid var(--border);border-radius:14px;background:#fffaf3;color:var(--text);font-size:18px;padding:0 14px;font-family:inherit}input:focus{outline:2px solid var(--accent);outline-offset:1px}button{height:50px;border:0;border-radius:14px;font-size:17px;font-weight:800;font-family:inherit;cursor:pointer}.primary{background:var(--accent);color:#fff}.soft{background:var(--soft);color:#14483B}.outline{background:#fff;color:#6e6b61;border:1px solid var(--border)}.danger{background:#fff;color:#8d8778;border:1px solid var(--border)}.danger.confirming{background:var(--danger-soft);color:var(--danger)}.add-grid{display:grid;grid-template-columns:1fr 120px;gap:10px}.add-grid button{grid-column:1/-1}.search{margin-bottom:14px}.student-card{padding:16px}.student-top{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}.student-name{font-size:22px;font-weight:900;margin:0}.last{font-size:15px;color:#6e6b61;font-weight:700;margin-top:5px}.badge{white-space:nowrap;border-radius:999px;padding:8px 12px;font-weight:900;background:var(--soft);color:var(--accent)}.badge.zero{background:var(--danger-soft);color:var(--danger)}.badge.low{background:var(--warn-soft);color:var(--warn)}.triple{margin:16px 0}.lesson-controls{display:grid;grid-template-columns:1fr 1fr;gap:10px}.lesson-controls label{grid-column:1/-1;color:#6e6b61;font-weight:900}.lesson-controls input{height:58px}.renew-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}.history{border-top:1px solid var(--border);margin-top:14px;padding-top:12px}.lesson-item{display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);padding:10px 0;font-weight:700}.lesson-item:last-child{border-bottom:0}.tiny{height:34px;width:34px;padding:0;border-radius:10px;background:#fff;color:#aaa;border:1px solid var(--border)}.empty{text-align:center;color:#aaa;font-weight:800;padding:36px 10px}.month-card h2{font-size:20px;margin:0 0 14px}.ranking{margin-top:18px}.ranking-row{display:flex;justify-content:space-between;border-bottom:1px solid var(--border);padding:10px 0;font-weight:800}.ranking-row:last-child{border-bottom:0}@media(max-width:420px){.add-grid,.lesson-controls,.renew-row{grid-template-columns:1fr}.stats,.triple{gap:8px}.num{font-size:24px}.container{padding-left:12px;padding-right:12px}}
</style>
</head>
<body>
<div class="container">
  <div class="header"><h1>上課紀錄</h1><p>記錄學生堂數與上課日期</p></div>
  <div id="sync-bar" class="sync-bar"></div>
  <div id="sync-settings" class="sync-settings" style="display:none"></div>
  <div id="stats" class="stats"></div>
  <div class="card">
    <div class="add-grid">
      <input id="new-student-name" placeholder="學生姓名">
      <input id="new-total-lessons" type="number" min="0" inputmode="numeric" placeholder="總堂數">
      <button class="primary" id="add-student-btn">新增學生</button>
    </div>
  </div>
  <input class="search" id="search-input" placeholder="搜尋學生姓名">
  <div id="student-list"></div>
  <div id="month-report" class="month-card"></div>
</div>
<script>
const STORE_KEY_STUDENTS='lesson_tracker_students_v11';
const STORE_KEY_LESSONS='lesson_tracker_lessons_v11';
const OLD_STUDENTS='lesson_tracker_students';
const OLD_LESSONS='lesson_tracker_lessons';
const SYNC_URL_KEY='lesson_tracker_sync_url';
const PENDING_KEY='lesson_tracker_pending_sync_v11';
const LAST_SYNC_KEY='lesson_tracker_last_sync';
let students=[],lessons=[],expandedIds=new Set(),searchTerm='',settingsOpen=false,syncState='not-configured';
function genId(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7)}
function escapeHtml(str){const d=document.createElement('div');d.textContent=str??'';return d.innerHTML}
function todayStr(){const d=new Date();return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`}
function formatDate(s){if(!s)return'尚無紀錄';const d=new Date(s+'T00:00:00');const w=['日','一','二','三','四','五','六'];return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}（週${w[d.getDay()]}）`}
function formatTime(iso){if(!iso)return'';const d=new Date(iso);return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`}
function getSyncUrl(){return localStorage.getItem(SYNC_URL_KEY)||''} function setSyncUrl(u){localStorage.setItem(SYNC_URL_KEY,u)} function clearSyncUrl(){localStorage.removeItem(SYNC_URL_KEY)}
function normalizeStudents(arr){return (arr||[]).map(s=>({id:String(s.id||genId()),name:String(s.name||''),totalLessons:Number(s.totalLessons||0)})).filter(s=>s.name)}
function normalizeLessons(arr){return (arr||[]).map(l=>({id:String(l.id||genId()),studentId:String(l.studentId||''),studentName:String(l.studentName||''),date:String(l.date||'')})).filter(l=>l.studentId&&l.date)}
function loadLocal(){try{students=normalizeStudents(JSON.parse(localStorage.getItem(STORE_KEY_STUDENTS)||localStorage.getItem(OLD_STUDENTS)||'[]'))}catch(e){students=[]}try{lessons=normalizeLessons(JSON.parse(localStorage.getItem(STORE_KEY_LESSONS)||localStorage.getItem(OLD_LESSONS)||'[]'))}catch(e){lessons=[]}backfillLessonNames();saveLocal()}
function saveLocal(){localStorage.setItem(STORE_KEY_STUDENTS,JSON.stringify(students));localStorage.setItem(STORE_KEY_LESSONS,JSON.stringify(lessons))}
function backfillLessonNames(){const names=Object.fromEntries(students.map(s=>[s.id,s.name]));lessons.forEach(l=>{if(!l.studentName)l.studentName=names[l.studentId]||''})}
async function pushToSheet(){const url=getSyncUrl();backfillLessonNames();const res=await fetch(url,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify({action:'syncAll',students,lessons})});const data=await res.json();if(!data.ok)throw new Error(data.error||'sync failed')}
async function pullFromSheet(){const res=await fetch(getSyncUrl(),{method:'GET'});const data=await res.json();if(!data.ok)throw new Error(data.error||'load failed');students=normalizeStudents(data.students);lessons=normalizeLessons(data.lessons);backfillLessonNames();saveLocal()}
async function triggerSync(){if(!getSyncUrl())return;localStorage.setItem(PENDING_KEY,'true');syncState='syncing';renderSyncBar();try{await pushToSheet();localStorage.setItem(PENDING_KEY,'false');localStorage.setItem(LAST_SYNC_KEY,new Date().toISOString());syncState='synced'}catch(e){syncState='error'}renderSyncBar()}
async function initSync(){if(!getSyncUrl()){syncState='not-configured';renderSyncBar();return}syncState='syncing';renderSyncBar();try{if(localStorage.getItem(PENDING_KEY)==='true'){await pushToSheet()}else{await pullFromSheet()}localStorage.setItem(PENDING_KEY,'false');localStorage.setItem(LAST_SYNC_KEY,new Date().toISOString());syncState='synced'}catch(e){syncState='error'}renderSyncBar();render()}
async function manualSync(){syncState='syncing';renderSyncBar();try{await pushToSheet();await pullFromSheet();localStorage.setItem(PENDING_KEY,'false');localStorage.setItem(LAST_SYNC_KEY,new Date().toISOString());syncState='synced'}catch(e){syncState='error'}renderSyncBar();render()}
async function connectSync(){const url=document.getElementById('sync-url-input').value.trim();if(!url)return;setSyncUrl(url);syncState='syncing';renderSyncBar();try{await pushToSheet();localStorage.setItem(PENDING_KEY,'false');localStorage.setItem(LAST_SYNC_KEY,new Date().toISOString());syncState='synced'}catch(e){syncState='error'}settingsOpen=false;renderSyncBar();renderSyncSettings()}
function disconnectSync(){clearSyncUrl();localStorage.removeItem(PENDING_KEY);syncState='not-configured';settingsOpen=false;renderSyncBar();renderSyncSettings()}
function toggleSettings(){settingsOpen=!settingsOpen;renderSyncSettings()}
function renderSyncBar(){const bar=document.getElementById('sync-bar');bar.className='sync-bar state-'+syncState;const last=localStorage.getItem(LAST_SYNC_KEY);let text='',actions='';if(syncState==='not-configured'){text='尚未設定雲端同步';actions='<button onclick="toggleSettings()">設定</button>'}else if(syncState==='syncing'){text='同步中…'}else if(syncState==='synced'){text='已同步'+(last?`・上次更新 ${formatTime(last)}`:'');actions='<button onclick="toggleSettings()">設定</button>'}else{text='同步失敗，已儲存在本機';actions='<button onclick="manualSync()">重試</button><button onclick="toggleSettings()">設定</button>'}bar.innerHTML=`<span>${text}</span>${actions}`}
function renderSyncSettings(){const p=document.getElementById('sync-settings');if(!settingsOpen){p.style.display='none';return}p.style.display='block';p.innerHTML=`<p>貼上 Google Apps Script 部署後的網址（結尾是 /exec）</p><input id="sync-url-input" placeholder="https://script.google.com/macros/s/.../exec" value="${escapeHtml(getSyncUrl())}"><div class="sync-settings-actions"><button class="primary" onclick="connectSync()">儲存並同步</button>${getSyncUrl()?'<button class="outline" onclick="disconnectSync()">取消連接</button>':''}</div>`}
function addStudent(){const name=document.getElementById('new-student-name').value.trim();const total=Number(document.getElementById('new-total-lessons').value||0);if(!name)return;students.push({id:genId(),name,totalLessons:Math.max(0,total)});document.getElementById('new-student-name').value='';document.getElementById('new-total-lessons').value='';saveLocal();render();triggerSync()}
function addLesson(studentId,date){if(!date)return;const s=students.find(x=>x.id===studentId);if(!s)return;const used=lessons.filter(l=>l.studentId===studentId).length;const remaining=Number(s.totalLessons||0)-used;if(remaining<=0&&!confirm('此學生剩餘堂數為 0，仍要記一堂嗎？'))return;lessons.push({id:genId(),studentId,studentName:s.name,date});saveLocal();render();triggerSync()}
function renewStudent(studentId){const s=students.find(x=>x.id===studentId);if(!s)return;const val=prompt(`請輸入 ${s.name} 續約堂數`, '36');if(val===null)return;const n=Number(val);if(!n||n<=0)return alert('請輸入大於 0 的堂數');s.totalLessons=Number(s.totalLessons||0)+n;saveLocal();render();triggerSync()}
function deleteLesson(id){lessons=lessons.filter(l=>l.id!==id);saveLocal();render();triggerSync()}
function deleteStudent(id){students=students.filter(s=>s.id!==id);lessons=lessons.filter(l=>l.studentId!==id);saveLocal();render();triggerSync()}
function confirmAction(btn,text,fn){if(btn.dataset.confirming==='true'){clearTimeout(Number(btn.dataset.timeoutId));fn()}else{btn.dataset.confirming='true';btn.dataset.originalText=btn.textContent;btn.textContent=text;btn.classList.add('confirming');const t=setTimeout(()=>{btn.dataset.confirming='false';btn.textContent=btn.dataset.originalText;btn.classList.remove('confirming')},2500);btn.dataset.timeoutId=t}}
function toggleExpand(id){expandedIds.has(id)?expandedIds.delete(id):expandedIds.add(id);render()}
function studentLessons(id){return lessons.filter(l=>l.studentId===id).sort((a,b)=>b.date.localeCompare(a.date))}
function badgeClass(r){return r<=0?'zero':r<=3?'low':''}
function render(){renderStats();renderStudents();renderMonthReport()}
function renderStats(){document.getElementById('stats').innerHTML=`<div class="stat-box"><div class="num">${students.length}</div><div class="label">學生人數</div></div><div class="stat-box"><div class="num">${lessons.length}</div><div class="label">累積堂數</div></div>`}
function renderStudents(){const list=document.getElementById('student-list');if(students.length===0){list.innerHTML='<div class="empty">還沒有學生，在上方新增第一位學生。</div>';return}const filtered=students.filter(s=>s.name.toLowerCase().includes(searchTerm.toLowerCase())).sort((a,b)=>a.name.localeCompare(b.name,'zh-Hant'));if(!filtered.length){list.innerHTML=`<div class="empty">找不到「${escapeHtml(searchTerm)}」。</div>`;return}list.innerHTML=filtered.map(s=>{const sl=studentLessons(s.id);const used=sl.length,total=Number(s.totalLessons||0),rem=total-used,last=sl[0]?.date;const expanded=expandedIds.has(s.id);const history=sl.length?sl.map(l=>`<div class="lesson-item"><span>${formatDate(l.date)}</span><button class="tiny" onclick="confirmAction(this,'?',()=>deleteLesson('${l.id}'))">×</button></div>`).join(''):'<div class="empty">尚無上課紀錄。</div>';return `<div class="student-card"><div class="student-top" onclick="toggleExpand('${s.id}')"><div><p class="student-name">${escapeHtml(s.name)}</p><div class="last">最後上課：${last?formatDate(last):'尚無紀錄'}</div></div><div class="badge ${badgeClass(rem)}">剩餘 ${rem} 堂</div></div><div class="triple"><div class="metric"><div class="num">${total}</div><div class="label">總堂數</div></div><div class="metric"><div class="num">${used}</div><div class="label">已上</div></div><div class="metric"><div class="num">${rem}</div><div class="label">剩餘</div></div></div><div class="lesson-controls"><label>上課日期</label><input type="date" id="date-${s.id}" value="${todayStr()}"><button class="soft" onclick="addLesson('${s.id}',document.getElementById('date-${s.id}').value)">＋記一堂</button></div><div class="renew-row"><button class="outline" onclick="renewStudent('${s.id}')">＋續約堂數</button><button class="outline" onclick="toggleExpand('${s.id}')">${expanded?'收合紀錄':'查看紀錄'}</button></div>${expanded?`<div class="history">${history}<button class="danger" style="width:100%;margin-top:14px" onclick="confirmAction(this,'確定刪除？',()=>deleteStudent('${s.id}'))">刪除這位學生</button></div>`:''}</div>`}).join('')}
function renderMonthReport(){const now=new Date(),ym=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;const monthLessons=lessons.filter(l=>l.date&&l.date.startsWith(ym));const counts={};monthLessons.forEach(l=>{counts[l.studentId]=(counts[l.studentId]||0)+1});const active=Object.keys(counts).length;const avg=active?(monthLessons.length/active).toFixed(1):0;let ranking=Object.entries(counts).sort((a,b)=>b[1]-a[1]).map(([id,c])=>`<div class="ranking-row"><span>${escapeHtml(students.find(s=>s.id===id)?.name||'未知學生')}</span><span>${c} 堂</span></div>`).join('');if(!ranking)ranking='<div class="empty">本月尚無上課紀錄。</div>';document.getElementById('month-report').innerHTML=`<h2>📊 本月統計（${ym}）</h2><div class="triple"><div class="metric"><div class="num">${monthLessons.length}</div><div class="label">本月總堂數</div></div><div class="metric"><div class="num">${active}</div><div class="label">本月學生數</div></div><div class="metric"><div class="num">${avg}</div><div class="label">平均堂數</div></div></div><div class="ranking">${ranking}</div>`}
document.getElementById('add-student-btn').addEventListener('click',addStudent);document.getElementById('new-student-name').addEventListener('keydown',e=>{if(e.key==='Enter')addStudent()});document.getElementById('new-total-lessons').addEventListener('keydown',e=>{if(e.key==='Enter')addStudent()});document.getElementById('search-input').addEventListener('input',e=>{searchTerm=e.target.value;renderStudents()});loadLocal();render();renderSyncBar();renderSyncSettings();initSync();
</script>
</body>
</html>
