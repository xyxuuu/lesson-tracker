<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>上課紀錄</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="上課紀錄">
<meta name="theme-color" content="#1F6F5C">
<style>
:root{
  --bg:#FAF8F4;--card:#fff;--border:#E3DFD3;--text:#2B2A26;
  --text2:#6E6B61;--muted:#A29D8E;--accent:#1F6F5C;--accentSoft:#E3F1EC;
  --accentText:#14483B;--danger:#B23A3A;--dangerSoft:#FBEAEA;
  --warn:#8A6116;--warnSoft:#FAF1DC;
}
*{box-sizing:border-box}
html,body{
  margin:0;background:var(--bg);color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"PingFang TC","Microsoft JhengHei","Helvetica Neue",Arial,sans-serif;
  -webkit-tap-highlight-color:transparent;
}
.container{
  max-width:560px;margin:0 auto;
  padding:calc(24px + env(safe-area-inset-top)) 16px calc(56px + env(safe-area-inset-bottom));
}
h1{font-size:28px;margin:0 0 4px;font-weight:800}
.header p{font-size:15px;color:var(--text2);margin:0 0 18px;font-weight:600}
.card,.sync-settings,.student-card{
  background:var(--card);border:1px solid var(--border);border-radius:18px;padding:16px;margin-bottom:14px;
}
.sync-bar{
  display:flex;align-items:center;justify-content:space-between;gap:10px;
  background:var(--card);border:1px solid var(--border);border-radius:16px;
  padding:12px 14px;margin-bottom:18px;font-size:15px;font-weight:700;
}
.sync-status-text{flex:1}
.sync-bar.state-synced{color:var(--accentText)}
.sync-bar.state-error{background:var(--dangerSoft);color:var(--danger);border-color:transparent}
.sync-bar.state-not-configured{color:var(--muted)}
.sync-bar button,.sync-settings button{
  height:40px;padding:0 14px;border:1px solid var(--border);border-radius:12px;background:transparent;
  color:inherit;font-size:15px;font-weight:800;
}
.sync-settings p{font-size:14px;color:var(--text2);margin:0 0 10px;line-height:1.5}
.sync-settings-actions{display:flex;gap:10px;margin-top:10px}
.sync-settings-actions button:first-child{flex:1;background:var(--accent);color:#fff;border-color:var(--accent)}
.sync-settings-actions button:last-child{color:var(--muted)}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:18px}
.stat{
  background:var(--accentSoft);border-radius:16px;padding:14px 8px;text-align:center;
}
.stat b{display:block;font-size:28px;color:var(--accentText);line-height:1}
.stat span{display:block;margin-top:6px;font-size:13px;color:var(--accentText);font-weight:700}
.section-title{font-size:18px;margin:0 0 12px;color:var(--text2);font-weight:900}
label{display:block;font-size:15px;color:var(--text2);font-weight:800;margin:0 0 8px}
input[type="text"],input[type="number"],input[type="date"]{
  width:100%;height:52px;border:1px solid var(--border);border-radius:14px;
  padding:0 14px;background:var(--bg);color:var(--text);font-size:18px;font-family:inherit;
}
input:focus{outline:2px solid var(--accent);outline-offset:1px}
.form-grid{display:grid;grid-template-columns:1.6fr .9fr;gap:12px;align-items:end}
.field{min-width:0}
button{
  border:none;border-radius:14px;height:52px;padding:0 16px;font-size:18px;
  font-family:inherit;font-weight:900;cursor:pointer;
}
.btn{background:var(--accent);color:#fff}
.btn-soft{background:var(--accentSoft);color:var(--accentText)}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border)}
.btn-danger{background:var(--dangerSoft);color:var(--danger)}
#add-student-btn{grid-column:1 / span 1;margin-top:10px}
#search-input{margin-bottom:14px;height:56px;font-size:19px}
.student-top{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}
.student-name{font-size:22px;font-weight:900;margin:0}
.last-date{font-size:15px;color:var(--text2);margin-top:6px;font-weight:700}
.pill{
  font-size:15px;border-radius:999px;padding:8px 12px;background:var(--accentSoft);
  color:var(--accentText);white-space:nowrap;font-weight:900;
}
.pill.warn{background:var(--warnSoft);color:var(--warn)}
.pill.danger{background:var(--dangerSoft);color:var(--danger)}
.lesson-summary{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:14px 0}
.lesson-box{background:var(--bg);border:1px solid var(--border);border-radius:16px;padding:14px 8px;text-align:center}
.lesson-box b{display:block;font-size:28px;line-height:1}
.lesson-box span{display:block;margin-top:7px;font-size:14px;color:var(--text2);font-weight:800}
.date-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;align-items:end;margin-top:12px}
.actions{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:12px}
.history{margin-top:14px;border-top:1px solid var(--border);padding-top:10px}
.lesson-item{
  display:flex;justify-content:space-between;align-items:center;gap:8px;
  padding:10px 0;border-bottom:1px solid var(--border);font-size:15px;
}
.lesson-item:last-child{border-bottom:none}
.lesson-edit{display:flex;gap:8px;align-items:center;flex:1;min-width:0}
.lesson-edit input[type="date"]{height:40px;font-size:15px;border-radius:10px;padding:0 10px}
.lesson-edit button,.small-btn{height:40px;font-size:14px;padding:0 10px;border-radius:10px;white-space:nowrap}
.empty{padding:34px 12px;text-align:center;color:var(--muted);line-height:1.6;font-weight:700}
.monthly-list{margin-top:8px}
.month-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);font-size:16px}
.month-row:last-child{border-bottom:none}
dialog{border:none;border-radius:20px;padding:0;max-width:360px;width:calc(100% - 32px);box-shadow:0 20px 60px rgba(0,0,0,.2)}
dialog::backdrop{background:rgba(0,0,0,.25)}
.modal{padding:20px}
.modal h3{margin:0 0 8px;font-size:20px}
.modal p{margin:0 0 12px;color:var(--text2);font-size:15px;line-height:1.5}
.modal-actions{display:flex;gap:10px;margin-top:14px}
.modal-actions button{flex:1}

/* iPhone / phone layout */
@media(max-width:520px){
  .container{padding-left:14px;padding-right:14px}
  h1{font-size:26px}
  .stats,.lesson-summary{grid-template-columns:repeat(3,1fr);gap:8px}
  .stat b,.lesson-box b{font-size:24px}
  .stat span,.lesson-box span{font-size:12px}
  .form-grid,.date-row,.actions{grid-template-columns:1fr}
  #add-student-btn{grid-column:auto}
  input[type="date"]{
    -webkit-appearance:none;appearance:none;
    height:56px;line-height:56px;text-align:center;font-size:18px;
  }
  .date-row button,.actions button{width:100%;height:54px}
  .student-card{overflow:hidden}
  .lesson-item{align-items:stretch;flex-direction:column}
  .lesson-edit{width:100%;flex-direction:column;align-items:stretch}
  .lesson-edit input[type="date"]{height:50px;font-size:17px;text-align:center}
  .lesson-edit button,.lesson-item>.small-btn{width:100%;height:46px}
}
@media(max-width:360px){
  .stats,.lesson-summary{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>上課紀錄</h1>
    <p>記錄學生上課日期、堂數與每月統計</p>
  </div>

  <div id="sync-bar" class="sync-bar"></div>
  <div id="sync-settings" class="sync-settings" style="display:none"></div>
  <div id="stats" class="stats"></div>

  <div class="card">
    <p class="section-title">新增學生</p>
    <div class="form-grid">
      <div class="field">
        <label>學生姓名</label>
        <input type="text" id="new-student-name" placeholder="例如：王小明">
      </div>
      <div class="field">
        <label>總堂數</label>
        <input type="number" id="new-student-total" min="0" step="1" placeholder="36">
      </div>
      <button class="btn" id="add-student-btn">新增</button>
    </div>
  </div>

  <input type="text" id="search-input" placeholder="搜尋學生姓名">
  <div id="student-list"></div>
  <div class="card" id="monthly-report"></div>
</div>

<dialog id="renew-dialog">
  <div class="modal">
    <h3 id="renew-title">續約堂數</h3>
    <p>請輸入這次續約新增的堂數。</p>
    <input type="number" id="renew-count" min="1" step="1" placeholder="例如：36">
    <div class="modal-actions">
      <button class="btn-ghost" onclick="closeRenewDialog()">取消</button>
      <button class="btn" onclick="confirmRenew()">確認</button>
    </div>
  </div>
</dialog>

<script>
const STORE_KEY_STUDENTS='lesson_tracker_students';
const STORE_KEY_LESSONS='lesson_tracker_lessons';
const SYNC_URL_KEY='lesson_tracker_sync_url';
const PENDING_KEY='lesson_tracker_pending_sync';
const LAST_SYNC_KEY='lesson_tracker_last_sync';

let students=[];
let lessons=[];
let expandedIds=new Set();
let searchTerm='';
let settingsOpen=false;
let syncState='not-configured';
let renewingStudentId=null;

function genId(){return Date.now().toString(36)+Math.random().toString(36).slice(2,8)}
function escapeHtml(str){const div=document.createElement('div');div.textContent=str??'';return div.innerHTML}
function todayStr(){
  const d=new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function toDateOnly(value){
  if(value===null||value===undefined)return '';
  let s=String(value).trim();
  if(!s)return '';
  if(s.startsWith("'"))s=s.slice(1).trim();

  let m=s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})/);
  if(m)return `${m[1]}-${String(m[2]).padStart(2,'0')}-${String(m[3]).padStart(2,'0')}`;

  m=s.match(/^(\d{4})\/(\d{1,2})\/(\d{1,2})/);
  if(m)return `${m[1]}-${String(m[2]).padStart(2,'0')}-${String(m[3]).padStart(2,'0')}`;

  m=s.match(/^(\d{4})年(\d{1,2})月(\d{1,2})日/);
  if(m)return `${m[1]}-${String(m[2]).padStart(2,'0')}-${String(m[3]).padStart(2,'0')}`;

  // Last resort only. This may depend on timezone, so normal text formats above are preferred.
  const d=new Date(s);
  if(!isNaN(d))return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  return '';
}
function formatDate(dateStr){
  const clean=toDateOnly(dateStr);
  if(!clean)return '尚無紀錄';
  const [y,m,d]=clean.split('-').map(Number);
  const localDate=new Date(y,m-1,d);
  const w=['日','一','二','三','四','五','六'];
  return `${y}/${String(m).padStart(2,'0')}/${String(d).padStart(2,'0')}（週${w[localDate.getDay()]}）`;
}
function formatTime(iso){
  if(!iso)return '';
  const d=new Date(iso);
  return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}
function normalizeStudent(s){
  return {
    id:String(s.id||genId()),
    name:String(s.name||''),
    totalLessons:Number(s.totalLessons||s.total||0)
  };
}
function normalizeLesson(l){
  return {
    id:String(l.id||genId()),
    studentId:String(l.studentId||''),
    studentName:String(l.studentName||''),
    date:toDateOnly(l.date)||todayStr()
  };
}
function loadLocal(){
  try{students=(JSON.parse(localStorage.getItem(STORE_KEY_STUDENTS)||'[]')).map(normalizeStudent)}catch(e){students=[]}
  try{lessons=(JSON.parse(localStorage.getItem(STORE_KEY_LESSONS)||'[]')).map(normalizeLesson)}catch(e){lessons=[]}
}
function saveStudentsLocal(){localStorage.setItem(STORE_KEY_STUDENTS,JSON.stringify(students))}
function saveLessonsLocal(){localStorage.setItem(STORE_KEY_LESSONS,JSON.stringify(lessons))}
function getSyncUrl(){return localStorage.getItem(SYNC_URL_KEY)||''}
function setSyncUrl(url){localStorage.setItem(SYNC_URL_KEY,url)}
function clearSyncUrl(){localStorage.removeItem(SYNC_URL_KEY)}
function enrichLessonNames(){
  lessons=lessons.map(l=>{
    const s=students.find(x=>x.id===l.studentId);
    return {...l,date:toDateOnly(l.date)||todayStr(),studentName:s?s.name:(l.studentName||'')};
  });
}

async function pushToSheet(){
  const url=getSyncUrl();
  enrichLessonNames();
  const res=await fetch(url,{
    method:'POST',
    headers:{'Content-Type':'text/plain;charset=utf-8'},
    body:JSON.stringify({action:'syncAll',students,lessons})
  });
  const data=await res.json();
  if(!data.ok)throw new Error(data.error||'sync failed');
}
async function pullFromSheet(){
  const url=getSyncUrl();
  const res=await fetch(url,{method:'GET'});
  const data=await res.json();
  if(!data.ok)throw new Error(data.error||'load failed');
  students=(data.students||[]).map(normalizeStudent);
  lessons=(data.lessons||[]).map(normalizeLesson);
  enrichLessonNames();
  saveStudentsLocal();
  saveLessonsLocal();
}
async function triggerSync(){
  if(!getSyncUrl())return;
  localStorage.setItem(PENDING_KEY,'true');
  syncState='syncing';
  renderSyncBar();
  try{
    await pushToSheet();
    localStorage.setItem(PENDING_KEY,'false');
    localStorage.setItem(LAST_SYNC_KEY,new Date().toISOString());
    syncState='synced';
  }catch(e){
    console.error(e);
    syncState='error';
  }
  renderSyncBar();
}
async function initSync(){
  const url=getSyncUrl();
  if(!url){syncState='not-configured';renderSyncBar();return}
  syncState='syncing';
  renderSyncBar();
  try{
    if(localStorage.getItem(PENDING_KEY)==='true'){
      await pushToSheet();
      localStorage.setItem(PENDING_KEY,'false');
    }else{
      await pullFromSheet();
    }
    localStorage.setItem(LAST_SYNC_KEY,new Date().toISOString());
    syncState='synced';
  }catch(e){
    console.error(e);
    syncState='error';
  }
  renderSyncBar();
  render();
}
async function manualSync(){
  syncState='syncing';
  renderSyncBar();
  try{
    await pullFromSheet();
    localStorage.setItem(PENDING_KEY,'false');
    localStorage.setItem(LAST_SYNC_KEY,new Date().toISOString());
    syncState='synced';
  }catch(e){
    console.error(e);
    syncState='error';
  }
  renderSyncBar();
  render();
}
async function connectSync(){
  const input=document.getElementById('sync-url-input');
  const url=input.value.trim();
  if(!url)return;
  setSyncUrl(url);
  syncState='syncing';
  renderSyncBar();
  try{
    await pullFromSheet();
    localStorage.setItem(PENDING_KEY,'false');
    localStorage.setItem(LAST_SYNC_KEY,new Date().toISOString());
    syncState='synced';
  }catch(e){
    // If the sheet is empty/new, push local data once.
    try{
      await pushToSheet();
      localStorage.setItem(PENDING_KEY,'false');
      localStorage.setItem(LAST_SYNC_KEY,new Date().toISOString());
      syncState='synced';
    }catch(err){
      console.error(err);
      syncState='error';
    }
  }
  settingsOpen=false;
  renderSyncBar();
  renderSyncSettings();
  render();
}
function disconnectSync(){
  clearSyncUrl();
  localStorage.removeItem(PENDING_KEY);
  syncState='not-configured';
  settingsOpen=false;
  renderSyncBar();
  renderSyncSettings();
}
function toggleSettings(){
  settingsOpen=!settingsOpen;
  renderSyncSettings();
}
function renderSyncBar(){
  const bar=document.getElementById('sync-bar');
  bar.className='sync-bar state-'+syncState;
  const last=localStorage.getItem(LAST_SYNC_KEY);
  let text='',actions='';
  if(syncState==='not-configured'){
    text='尚未設定雲端同步';
    actions='<button onclick="toggleSettings()">設定</button>';
  }else if(syncState==='syncing'){
    text='同步中…';
  }else if(syncState==='synced'){
    text='已同步'+(last?`・上次更新 ${formatTime(last)}`:'');
    actions='<button onclick="toggleSettings()">設定</button>';
  }else{
    text='同步失敗，已儲存在本機';
    actions='<button onclick="manualSync()">重試</button><button onclick="toggleSettings()">設定</button>';
  }
  bar.innerHTML=`<span class="sync-status-text">${text}</span>${actions}`;
}
function renderSyncSettings(){
  const panel=document.getElementById('sync-settings');
  if(!settingsOpen){panel.style.display='none';return}
  panel.style.display='block';
  const configured=!!getSyncUrl();
  panel.innerHTML=`
    <p>貼上 Google Apps Script 部署後的網址（結尾是 /exec）</p>
    <input type="text" id="sync-url-input" placeholder="https://script.google.com/macros/s/.../exec" value="${escapeHtml(getSyncUrl())}">
    <div class="sync-settings-actions">
      <button onclick="connectSync()">儲存並同步</button>
      ${configured?'<button onclick="disconnectSync()">取消連接</button>':''}
    </div>
  `;
}

function addStudent(){
  const name=document.getElementById('new-student-name').value.trim();
  const total=Number(document.getElementById('new-student-total').value||0);
  if(!name)return;
  students.push({id:genId(),name,totalLessons:Math.max(0,total)});
  document.getElementById('new-student-name').value='';
  document.getElementById('new-student-total').value='';
  saveStudentsLocal();
  render();
  triggerSync();
}
function addLesson(studentId,date){
  date=toDateOnly(date);
  if(!date)return;
  const s=students.find(x=>x.id===studentId);
  if(!s)return;
  lessons.push({id:genId(),studentId,studentName:s.name,date});
  saveLessonsLocal();
  render();
  triggerSync();
}
function updateLessonDate(id,date){
  date=toDateOnly(date);
  if(!date)return;
  lessons=lessons.map(l=>l.id===id?{...l,date}:l);
  saveLessonsLocal();
  render();
  triggerSync();
}
function deleteLessonConfirmed(id){
  lessons=lessons.filter(l=>l.id!==id);
  saveLessonsLocal();
  render();
  triggerSync();
}
function deleteStudentConfirmed(id){
  students=students.filter(s=>s.id!==id);
  lessons=lessons.filter(l=>l.studentId!==id);
  saveStudentsLocal();
  saveLessonsLocal();
  render();
  triggerSync();
}
function toggleExpand(id){
  expandedIds.has(id)?expandedIds.delete(id):expandedIds.add(id);
  render();
}
function handleAddLesson(studentId){
  const input=document.getElementById('date-'+studentId);
  addLesson(studentId,input.value);
}
function confirmAction(btn,text,onConfirm){
  if(btn.dataset.confirming==='true'){
    clearTimeout(Number(btn.dataset.timeoutId));
    onConfirm();
  }else{
    btn.dataset.confirming='true';
    btn.dataset.originalText=btn.textContent;
    btn.textContent=text;
    btn.classList.add('btn-danger');
    const t=setTimeout(()=>{
      btn.dataset.confirming='false';
      btn.textContent=btn.dataset.originalText;
      btn.classList.remove('btn-danger');
    },2500);
    btn.dataset.timeoutId=t;
  }
}
function handleDeleteLesson(btn,id){confirmAction(btn,'確定?',()=>deleteLessonConfirmed(id))}
function handleDeleteStudent(btn,id){confirmAction(btn,'確定刪除？',()=>deleteStudentConfirmed(id))}
function openRenewDialog(studentId){
  renewingStudentId=studentId;
  const s=students.find(x=>x.id===studentId);
  document.getElementById('renew-title').textContent=`${s?s.name:''}・續約堂數`;
  document.getElementById('renew-count').value='';
  document.getElementById('renew-dialog').showModal();
  setTimeout(()=>document.getElementById('renew-count').focus(),50);
}
function closeRenewDialog(){
  document.getElementById('renew-dialog').close();
  renewingStudentId=null;
}
function confirmRenew(){
  const n=Number(document.getElementById('renew-count').value||0);
  if(!renewingStudentId||n<=0)return;
  students=students.map(s=>s.id===renewingStudentId?{...s,totalLessons:Number(s.totalLessons||0)+n}:s);
  saveStudentsLocal();
  closeRenewDialog();
  render();
  triggerSync();
}
function getStudentLessons(id){
  return lessons
    .filter(l=>l.studentId===id)
    .sort((a,b)=>toDateOnly(b.date).localeCompare(toDateOnly(a.date)));
}
function countThisMonth(){
  const now=new Date();
  const ym=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  const monthLessons=lessons.filter(l=>toDateOnly(l.date).startsWith(ym));
  const by={};
  monthLessons.forEach(l=>{
    const name=l.studentName||(students.find(s=>s.id===l.studentId)?.name)||'未命名';
    by[name]=(by[name]||0)+1;
  });
  return {ym,total:monthLessons.length,studentCount:Object.keys(by).length,by};
}
function render(){
  enrichLessonNames();
  const thisYm=new Date().toISOString().slice(0,7);
  document.getElementById('stats').innerHTML=`
    <div class="stat"><b>${students.length}</b><span>學生人數</span></div>
    <div class="stat"><b>${lessons.length}</b><span>累積堂數</span></div>
    <div class="stat"><b>${lessons.filter(l=>toDateOnly(l.date).startsWith(thisYm)).length}</b><span>本月堂數</span></div>
  `;
  const list=document.getElementById('student-list');
  const filtered=students
    .filter(s=>s.name.toLowerCase().includes(searchTerm.toLowerCase()))
    .sort((a,b)=>a.name.localeCompare(b.name,'zh-Hant'));
  if(students.length===0){
    list.innerHTML='<div class="empty">還沒有學生，在上方輸入姓名與總堂數新增第一位學生。</div>';
  }else if(filtered.length===0){
    list.innerHTML=`<div class="empty">找不到符合「${escapeHtml(searchTerm)}」的學生。</div>`;
  }else{
    list.innerHTML=filtered.map(s=>{
      const sl=getStudentLessons(s.id);
      const used=sl.length;
      const total=Number(s.totalLessons||0);
      const remain=total-used;
      const last=sl[0]?.date||'';
      const expanded=expandedIds.has(s.id);
      const pillClass=remain<=1?'danger':remain<=3?'warn':'';
      const history=sl.length===0
        ? '<p class="empty" style="padding:12px">尚無上課紀錄。</p>'
        : sl.map(l=>`
          <div class="lesson-item">
            <div class="lesson-edit">
              <input type="date" id="lesson-date-${l.id}" value="${toDateOnly(l.date)}">
              <button class="btn-ghost small-btn" onclick="updateLessonDate('${l.id}',document.getElementById('lesson-date-${l.id}').value)">儲存日期</button>
            </div>
            <button class="btn-ghost small-btn" onclick="handleDeleteLesson(this,'${l.id}')">刪除</button>
          </div>
        `).join('');
      return `
        <div class="student-card">
          <div class="student-top">
            <div>
              <p class="student-name">${escapeHtml(s.name)}</p>
              <div class="last-date">最後上課：${formatDate(last)}</div>
            </div>
            <div class="pill ${pillClass}">剩餘 ${remain} 堂</div>
          </div>
          <div class="lesson-summary">
            <div class="lesson-box"><b>${total}</b><span>總堂數</span></div>
            <div class="lesson-box"><b>${used}</b><span>已上</span></div>
            <div class="lesson-box"><b>${remain}</b><span>剩餘</span></div>
          </div>
          <div class="date-row">
            <div>
              <label>上課日期</label>
              <input type="date" id="date-${s.id}" value="${todayStr()}">
            </div>
            <button class="btn-soft" onclick="handleAddLesson('${s.id}')">＋記一堂</button>
          </div>
          <div class="actions">
            <button class="btn-ghost" onclick="openRenewDialog('${s.id}')">＋續約堂數</button>
            <button class="btn-ghost" onclick="toggleExpand('${s.id}')">${expanded?'收合紀錄':'查看紀錄'}</button>
          </div>
          ${expanded?`<div class="history">${history}<button class="btn-ghost" style="width:100%;margin-top:10px" onclick="handleDeleteStudent(this,'${s.id}')">刪除這位學生</button></div>`:''}
        </div>
      `;
    }).join('');
  }
  renderMonthlyReport();
}
function renderMonthlyReport(){
  const r=countThisMonth();
  const rows=Object.entries(r.by)
    .sort((a,b)=>b[1]-a[1])
    .map(([name,count])=>`<div class="month-row"><span>${escapeHtml(name)}</span><b>${count} 堂</b></div>`)
    .join('');
  document.getElementById('monthly-report').innerHTML=`
    <p class="section-title">📊 本月統計（${r.ym}）</p>
    <div class="lesson-summary">
      <div class="lesson-box"><b>${r.total}</b><span>本月總堂數</span></div>
      <div class="lesson-box"><b>${r.studentCount}</b><span>本月學生數</span></div>
      <div class="lesson-box"><b>${r.studentCount?Math.round((r.total/r.studentCount)*10)/10:0}</b><span>平均堂數</span></div>
    </div>
    <div class="monthly-list">${rows||'<div class="empty" style="padding:12px">本月尚無上課紀錄。</div>'}</div>
  `;
}

document.getElementById('add-student-btn').addEventListener('click',addStudent);
document.getElementById('new-student-name').addEventListener('keydown',e=>{if(e.key==='Enter')addStudent()});
document.getElementById('new-student-total').addEventListener('keydown',e=>{if(e.key==='Enter')addStudent()});
document.getElementById('search-input').addEventListener('input',e=>{searchTerm=e.target.value;render()});

loadLocal();
render();
renderSyncBar();
renderSyncSettings();
initSync();
</script>
</body>
